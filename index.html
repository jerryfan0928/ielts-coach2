<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 雅思口說教練</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; text-align: center; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        
        /* 新增的輸入框樣式 */
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { font-weight: bold; color: #34495e; display: block; margin-bottom: 8px; }
        #topicInput { width: 100%; padding: 12px; font-size: 16px; border: 2px solid #bdc3c7; border-radius: 8px; box-sizing: border-box; transition: 0.3s; }
        #topicInput:focus { border-color: #3498db; outline: none; }

        button { padding: 12px 24px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; margin: 10px; transition: 0.3s; }
        #recordBtn { background-color: #e74c3c; color: white; }
        #recordBtn:hover { background-color: #c0392b; }
        #stopBtn { background-color: #95a5a6; color: white; }
        #stopBtn:disabled { background-color: #ecf0f1; cursor: not-allowed; }
        #status { margin-top: 15px; color: #e67e22; font-weight: bold; }
        #feedback { margin-top: 25px; text-align: left; background: #fafafa; padding: 20px; border-left: 5px solid #2ecc71; border-radius: 5px; white-space: pre-wrap; display: none; line-height: 1.6;}
    </style>
</head>
<body>

<div class="container">
    <h1>🤖 AI 雅思口說教練</h1>
    <p>貼上你想練習的題目，然後點擊錄音！</p>
    
    <div class="input-group">
        <label for="topicInput">📝 請輸入你要練習的題目：</label>
        <input type="text" id="topicInput" placeholder="例如：Describe your favorite movie...">
    </div>
    
    <button id="recordBtn">🎤 開始錄音</button>
    <button id="stopBtn" disabled>⏹️ 停止並送出評分</button>
    
    <div id="status">準備就緒</div>
    <div id="feedback"></div>
</div>

<script type="importmap">
  {
    "imports": {
      "@google/generative-ai": "https://esm.run/@google/generative-ai"
    }
  }
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    // ⚠️ 請在這裡貼上你的_GEMINI_API_KEY
    const API_KEY = AIzaSyBqAaSZUObKImX0w2QykuISGjKEHu1lHxc; 
    const genAI = new GoogleGenerativeAI(API_KEY);

    const topicInput = document.getElementById('topicInput');
    const recordBtn = document.getElementById('recordBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusText = document.getElementById('status');
    const feedbackBox = document.getElementById('feedback');

    let mediaRecorder;
    let audioChunks = [];
    let currentQuestion = ""; // 用來儲存使用者輸入的題目

    recordBtn.addEventListener('click', async () => {
        // 檢查使用者有沒有輸入題目
        currentQuestion = topicInput.value.trim();
        if (!currentQuestion) {
            alert("請先在上方輸入你想練習的題目喔！");
            topicInput.focus();
            return;
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = event => {
                audioChunks.push(event.data);
            };

            mediaRecorder.onstop = async () => {
                statusText.innerText = "⏳ AI 正在聽你的錄音並撰寫評語，請稍候...";
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                await sendToGemini(audioBlob, currentQuestion);
            };

            mediaRecorder.start();
            recordBtn.disabled = true;
            recordBtn.style.backgroundColor = "#ccc";
            stopBtn.disabled = false;
            stopBtn.style.backgroundColor = "#3498db";
            
            // 鎖定輸入框，錄音時不能改題目
            topicInput.disabled = true; 
            statusText.innerText = "🔴 正在錄音中... (請開始說話)";
            feedbackBox.style.display = "none";
        } catch (err) {
            alert("無法存取麥克風，請確認瀏覽器權限！");
        }
    });

    stopBtn.addEventListener('click', () => {
        mediaRecorder.stop();
        recordBtn.disabled = false;
        recordBtn.style.backgroundColor = "#e74c3c";
        stopBtn.disabled = true;
        stopBtn.style.backgroundColor = "#95a5a6";
        
        // 解鎖輸入框
        topicInput.disabled = false; 
    });

    async function sendToGemini(blob, questionToScore) {
        try {
            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = async () => {
                const base64Audio = reader.result.split(',')[1];
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                
                // 把使用者輸入的題目塞進 Prompt 裡面
                const prompt = `You are a strict but encouraging IELTS speaking examiner. 
                The student is answering this question: '${questionToScore}'. 
                Please listen to their audio response and provide:
                1. An estimated Band Score (0-9).
                2. Feedback on Fluency, Lexical Resource, Grammatical Range, and Pronunciation.
                3. A short, better way to answer this question to get a Band 8.0+.
                Please reply in Traditional Chinese (請用繁體中文回覆評語).`;

                const result = await model.generateContent([
                    prompt,
                    { inlineData: { mimeType: "audio/wav", data: base64Audio } }
                ]);

                feedbackBox.innerText = result.response.text();
                feedbackBox.style.display = "block";
                statusText.innerText = "✅ 分析完成！你可以輸入新題目繼續練習。";
                
                // 清空輸入框，方便下次輸入
                topicInput.value = "";
            };
        } catch (error) {
            statusText.innerText = "❌ 發生錯誤，請檢查 API Key 或網路連線。";
            console.error(error);
        }
    }
</script>

</body>
</html>
