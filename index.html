<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Writing AI Evaluator</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --bg-color: #f8f9fa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--primary-color);
        }
        input[type="password"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }
        textarea {
            resize: vertical;
        }
        .note {
            font-size: 0.85em;
            color: #666;
            margin-top: 4px;
        }
        button {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        #result-container {
            margin-top: 30px;
            padding: 20px;
            border-radius: 6px;
            background-color: #f1f8ff;
            border: 1px solid #c8e1ff;
            display: none;
        }
        .loader {
            display: none;
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            color: var(--secondary-color);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 IELTS Writing AI Evaluator</h1>
    
    <div class="form-group">
        <label for="apiKey">🔑 Google Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="請貼上你的 API Key (AIzaSy...)">
        <div class="note">安全提示：金鑰僅保存在你的瀏覽器中，不會傳送到其他伺服器。</div>
    </div>

    <div class="form-group">
        <label for="topic">📌 寫作題目 (Task 1 或 Task 2)</label>
        <textarea id="topic" rows="3" placeholder="例如：Some people think that..."></textarea>
    </div>

    <div class="form-group">
        <label for="essay">✍️ 你的作文</label>
        <textarea id="essay" rows="10" placeholder="在此貼上你的完整作文..."></textarea>
    </div>

    <button id="submitBtn" onclick="evaluateEssay()">開始 AI 評估</button>

    <div id="loader" class="loader">⏳ AI 正在仔細批改中，請稍候約 10-20 秒...</div>

    <div id="result-container">
        <h2 style="margin-top: 0; color: var(--primary-color);">🏆 評估報告</h2>
        <div id="result-content"></div>
    </div>
</div>

<script>
    async function evaluateEssay() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const topic = document.getElementById('topic').value.trim();
        const essay = document.getElementById('essay').value.trim();
        const submitBtn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const resultContainer = document.getElementById('result-container');
        const resultContent = document.getElementById('result-content');

        // 1. 簡單的輸入驗證
        if (!apiKey || !topic || !essay) {
            alert("⚠️ 請確保 API Key、題目和作文都已填寫！");
            return;
        }

        // 2. 切換 UI 狀態 (顯示載入中)
        submitBtn.disabled = true;
        loader.style.display = 'block';
        resultContainer.style.display = 'none';
        resultContent.innerHTML = '';

        // 3. 準備提示詞 (Prompt)
        const promptText = `
        You are an expert IELTS Writing Examiner. 
        The student is answering the following IELTS Writing prompt:
        "${topic}"
        
        Here is the student's essay:
        "${essay}"
        
        Please evaluate the essay based on the official IELTS Writing band descriptors.
        Your evaluation must include:
        1. Estimated Overall Band Score.
        2. Score breakdown and feedback for the four criteria: 
           - Task Response / Task Achievement
           - Coherence and Cohesion
           - Lexical Resource
           - Grammatical Range and Accuracy
        3. Specific corrections for grammatical or vocabulary errors (quote the original text and provide the corrected version).
        4. Actionable suggestions for how to improve the essay to reach Band 8.0 or higher.
        `;

        // 4. 呼叫 Gemini REST API
        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
        
        try {
            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: promptText }]
                    }]
                })
            });

            const data = await response.json();

            // 檢查 API 是否回傳錯誤
            if (!response.ok) {
                throw new Error(data.error?.message || "未知的 API 錯誤");
            }

            // 5. 取得 AI 回覆文字並轉譯 Markdown
            const aiText = data.candidates[0].content.parts[0].text;
            resultContent.innerHTML = marked.parse(aiText);
            resultContainer.style.display = 'block';

        } catch (error) {
            alert(`❌ 發生錯誤：\n${error.message}\n請檢查你的 API Key 是否正確或額度是否已滿。`);
        } finally {
            // 恢復 UI 狀態
            submitBtn.disabled = false;
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
